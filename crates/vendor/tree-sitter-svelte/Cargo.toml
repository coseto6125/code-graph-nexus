# 宣告獨立 workspace 邊界，避免被外圍 workspace 吸收。
[workspace]

[package]
name = "tree-sitter-svelte"
description = "Svelte SFC grammar for the tree-sitter parsing library (tree-sitter-grammars/tree-sitter-svelte v1.0.2)"
version = "1.0.2"
keywords = ["incremental", "parsing", "svelte"]
categories = ["parsing", "text-editors"]
repository = "https://github.com/tree-sitter-grammars/tree-sitter-svelte"
edition = "2021"
license = "MIT"

build = "bindings/rust/build.rs"
include = [
  "bindings/rust/*",
  "src/*",
]

[lib]
path = "bindings/rust/lib.rs"

[dependencies]
tree-sitter-language = "0.1.0"

[build-dependencies]
cc = "1.1.17"

[dev-dependencies]
tree-sitter = "0.26"
